<!doctype html>
<html lang="en">
<head>
    <title>Items List</title>
</head>
<body>

<section>
    
    <ul>
        {% if items %}
        {% for item in items %}
        <li>{{ item }}</li>
        {% endfor %}
    </ul>
    {% else %}
        <p>No items found</p>
    {% endif %}
</section>

</body>
</html>

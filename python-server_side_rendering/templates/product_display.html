<!doctype html>
<html lang="en">
    <head>
        <title>Products</title>
    </head>

    <body>
        <section>
            {% if error %}
            <h2>{{ error }}</h2>
            {% else %}
            <table border= "1">
                <tr>
                    <th>Id</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Price</th>
                </tr>
                {% for product in products %}
                <tr>
                    <td>{{ product.id }}</td>
                    <td>{{ product.name }}</td>
                    <td>{{ product.category }}</td>
                    <td>{{ product.price }}</td>
                </tr>
                {% endfor %}
            </table>
            {% endif %}
        </section>
    </body>
</html>
